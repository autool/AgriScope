server {
    listen 80;
    server_name localhost;
    client_max_body_size 10G;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_request_buffering off;
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    # 浏览器通过同源地址访问 OSM 镜像，规避跨网络切换导致的瓦片中断。
    location /map-tiles/ {
        proxy_pass https://tile.openstreetmap.de/;
        proxy_ssl_server_name on;
        proxy_set_header Host tile.openstreetmap.de;
        proxy_set_header User-Agent "Farmland-Monitor/1.0";
        proxy_connect_timeout 10s;
        proxy_read_timeout 20s;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /imagery-tiles/ {
        proxy_pass https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/;
        proxy_ssl_server_name on;
        proxy_set_header Host server.arcgisonline.com;
        proxy_set_header User-Agent "Remote-Sensing-Monitor/1.0";
        proxy_connect_timeout 10s;
        proxy_read_timeout 20s;
        expires 7d;
        add_header Cache-Control "public";
    }
}
